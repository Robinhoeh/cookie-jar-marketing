<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/cookie-jar-icon-2048-slack-marketplace.png" />
    <link rel="apple-touch-icon" href="/cookie-jar-icon-2048-slack-marketplace.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Jar — Slack access management</title>
    <meta name="description" content="Cookie Jar is a Slack-native access management tool. Request tools, get approvals, see who has what — all without leaving Slack." />

    <!-- OpenGraph baseline. Per-route useHead() overrides title/description/url
         at SSG build time; these defaults guarantee social scrapers (WhatsApp,
         LinkedIn, Slack, Discord) always see the core tags. -->
    <meta property="og:site_name" content="Cookie Jar" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://usecookiejar.com/" />
    <meta property="og:title" content="Cookie Jar — Slack access management" />
    <meta property="og:description" content="Slack-native access management for startups and small teams. Request tools with /cookie, approve in Slack, see who has what." />
    <meta property="og:image" content="https://usecookiejar.com/cookie-jar-og.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cookie Jar — Slack access management" />
    <meta name="twitter:description" content="Slack-native access management for startups and small teams." />
    <meta name="twitter:image" content="https://usecookiejar.com/cookie-jar-og.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
